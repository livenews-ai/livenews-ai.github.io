services:
  - type: web
    name: livenews-ai-backend
    runtime: python
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && npm install && npm run build && rm -rf backend/static && mkdir -p backend/static && cp -r dist/* backend/static/ && echo "=== Static files ===" && ls -la backend/static/ && ls -la backend/static/assets/
    startCommand: cd backend && python main.py
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "18"
